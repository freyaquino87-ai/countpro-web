<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Outer rounded rectangle (yellow body) -->
  <rect x="12" y="15" width="76" height="85" rx="16" ry="16" fill="#F59E0B" stroke="#0E0E12" stroke-width="4" stroke-linejoin="round"/>

  <!-- Flash button (top circle) -->
  <circle cx="50" cy="18" r="10" fill="#F59E0B" stroke="#0E0E12" stroke-width="3"/>
  <circle cx="50" cy="18" r="6" fill="#F59E0B" stroke="#0E0E12" stroke-width="2"/>

  <!-- Display screen (dark rectangle) -->
  <rect x="18" y="35" width="48" height="32" rx="4" ry="4" fill="#1A1A1E" stroke="#0E0E12" stroke-width="3" stroke-linejoin="round"/>

  <!-- Display numbers -->
  <text x="42" y="62" font-size="20" font-weight="bold" fill="#F59E0B" text-anchor="middle" font-family="monospace" letter-spacing="2">237</text>

  <!-- Battery (right side) -->
  <rect x="72" y="42" width="10" height="18" rx="1.5" ry="1.5" fill="#F59E0B" stroke="#0E0E12" stroke-width="2"/>
  <rect x="73" y="44" width="8" height="14" fill="#0E0E12"/>
  <rect x="73" y="44" width="8" height="10" fill="#F59E0B"/>
</svg>